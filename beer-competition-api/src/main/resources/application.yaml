spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  datasource:
    url: jdbc:mysql://${app.datasource.host}:${app.datasource.port}/${app.datasource.database}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: ${app.datasource.driver-class-name}
    username: ${app.datasource.username}
    password: ${app.datasource.password}
  data:
    redis:
      host: ${APP_REDIS_HOST:localhost}
      port: ${APP_REDIS_PORT:6379}
      password: ${APP_REDIS_PASSWORD:}
      database: ${APP_REDIS_DATABASE:0}
      timeout: ${APP_REDIS_TIMEOUT:3s}
      connect-timeout: ${APP_REDIS_CONNECT_TIMEOUT:3s}
      lettuce:
        pool:
          max-active: ${APP_REDIS_MAX_ACTIVE:16}
          max-idle: ${APP_REDIS_MAX_IDLE:8}
          min-idle: ${APP_REDIS_MIN_IDLE:1}
          max-wait: ${APP_REDIS_MAX_WAIT:3s}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

mybatis-plus:
  type-aliases-package: com.beercompetition.pojo.po
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      table-underline: true

app:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    host: ${APP_DB_HOST:localhost}
    port: ${APP_DB_PORT:3306}
    database: ${APP_DB_NAME:beer_competition}
    username: ${APP_DB_USERNAME:root}
    password: ${APP_DB_PASSWORD:}
  jwt:
    secret-key: ${APP_JWT_SECRET:change-me-beer-competition-secret}
    header-name: Authorization
    admin-ttl: ${APP_JWT_ADMIN_TTL:7200000}
    portal-ttl: ${APP_JWT_PORTAL_TTL:7200000}
    judge-ttl: ${APP_JWT_JUDGE_TTL:7200000}
  sms:
    code-ttl-minutes: ${APP_SMS_CODE_TTL_MINUTES:5}
    mock-enabled: ${APP_SMS_MOCK_ENABLED:false}
    access-key-id: ${APP_ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${APP_ALIYUN_ACCESS_KEY_SECRET:}
    endpoint: ${APP_SMS_ENDPOINT:dypnsapi.aliyuncs.com}
    scheme-name: ${APP_SMS_SCHEME_NAME:默认方案}
    sign-name: ${APP_SMS_SIGN_NAME:}
    template-code: ${APP_SMS_TEMPLATE_CODE:}
    country-code: ${APP_SMS_COUNTRY_CODE:86}
    send-interval-seconds: ${APP_SMS_SEND_INTERVAL_SECONDS:60}
    code-length: ${APP_SMS_CODE_LENGTH:6}
    code-type: ${APP_SMS_CODE_TYPE:1}
    duplicate-policy: ${APP_SMS_DUPLICATE_POLICY:1}
  pii:
    aes-key: ${APP_PII_AES_KEY:dev-beer-competition-pii-aes-key-change-me}
    hash-key: ${APP_PII_HASH_KEY:dev-beer-competition-pii-hash-key-change-me}
  storage:
    provider: ${APP_STORAGE_PROVIDER:local}
    local-base-dir: ${APP_STORAGE_LOCAL_DIR:uploads}
    endpoint: ${APP_ALIOSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${APP_ALIOSS_ACCESS_KEY_ID:}
    access-key-secret: ${APP_ALIOSS_ACCESS_KEY_SECRET:}
    bucket-name: ${APP_ALIOSS_BUCKET_NAME:}
  export:
    judge-h5-base-url: ${APP_JUDGE_H5_BASE_URL:http://localhost:5174}
  wechat-pay:
    mode: ${APP_WECHAT_PAY_MODE:MOCK}
    app-id: ${APP_WECHAT_PAY_APP_ID:}
    mch-id: ${APP_WECHAT_PAY_MCH_ID:}
    merchant-serial-no: ${APP_WECHAT_PAY_MERCHANT_SERIAL_NO:}
    api-v3-key: ${APP_WECHAT_PAY_API_V3_KEY:}
    private-key-path: ${APP_WECHAT_PAY_PRIVATE_KEY_PATH:}
    notify-base-url: ${APP_WECHAT_PAY_NOTIFY_BASE_URL:}
