name: Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy to ECS
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 0d000721
          MYSQL_DATABASE: beer_competition
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p0d000721"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      APP_DB_HOST: 127.0.0.1
      APP_DB_PORT: 3306
      APP_DB_NAME: beer_competition
      APP_DB_USERNAME: root
      APP_DB_PASSWORD: 0d000721
      APP_REDIS_HOST: 127.0.0.1
      APP_REDIS_PORT: 6379
      APP_REDIS_PASSWORD: ''
      APP_REDIS_DATABASE: 0
      APP_SMS_MOCK_ENABLED: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Initialize test database
        run: |
          if ! command -v mysql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y mysql-client
          fi
          mysql -h 127.0.0.1 -P 3306 -uroot -p"$APP_DB_PASSWORD" \
            --default-character-set=utf8mb4 "$APP_DB_NAME" \
            < beer-competition-api/src/main/resources/db/migrations/beer_competition_full.sql

      - name: Build backend
        working-directory: beer-competition-api
        run: mvn clean package

      - name: Install console dependencies
        working-directory: beer-competition-console
        run: npm ci

      - name: Build console
        working-directory: beer-competition-console
        run: npm run build -- --base=/console/

      - name: Install judge dependencies
        working-directory: beer-competition-judge-h5
        run: npm ci

      - name: Build judge
        working-directory: beer-competition-judge-h5
        run: npm run build -- --base=/judge/

      - name: Assemble release package
        run: |
          mkdir -p release/app release/www/console release/www/judge
          cp beer-competition-api/target/beer-competition-api-0.0.1-SNAPSHOT.jar release/app/beer-api.jar
          cp -a beer-competition-console/dist/. release/www/console/
          cp -a beer-competition-judge-h5/dist/. release/www/judge/
          cd release
          zip -r ../release.zip app www

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/ecs_deploy_key
          chmod 600 ~/.ssh/ecs_deploy_key
          ssh-keyscan -p "${{ secrets.ECS_PORT }}" "${{ secrets.ECS_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release package
        run: |
          scp -i ~/.ssh/ecs_deploy_key -P "${{ secrets.ECS_PORT }}" release.zip \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}:/opt/beer-competition/uploads/release.zip"

      - name: Run deploy script
        run: |
          ssh -i ~/.ssh/ecs_deploy_key -p "${{ secrets.ECS_PORT }}" \
            "${{ secrets.ECS_USER }}@${{ secrets.ECS_HOST }}" \
            "bash /opt/beer-competition/scripts/deploy.sh /opt/beer-competition/uploads/release.zip"
